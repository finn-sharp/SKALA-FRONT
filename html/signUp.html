<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>회원가입</h1>
    <p>SKALA-FRONT 회원가입을 환영합니다.</p>
    <hr>
    <!-- HTML FORM EXAMPLE 1 -->
    <form>
        <fieldset>
            <legend>계정 정보</legend>
            <p>
                <label for="userId">아이디: </label>
                <input type="text" id="userId" name="userId" minlength="4" maxlength="15" required placeholder="4~15자 영문/숫자">
                <small>(필수)</small>
            </p>
            <p>
                <label for="userPw">비밀번호: </label>
                <input type="password" id="userPw" name="userPw" minlength="8" required placeholder="8자 이상 입력">
                <small>(필수)</small>
            </p>
            <p>
                <label for="userEmail">이메일: </label>
                <input type="email" id="userEmail" name="userEmail" placeholder="example">
                @
                <select name="emailDomain">
                    <option value="direct">직접 입력</option>
                    <option value="naver.com">naver.com</option>
                    <option value="gmail.com">gmail.com</option>
                    <option value="daum.net">daum.net</option>
                    <option value="nate.com">nate.com</option>
                    <option value="hanmail.net">hanmail.net</option>
                </select>
            </p>
        </fieldset>
    </form>
    <br>
    <!-- HTML FORM EXAMPLE 2 -->
    <form>
        <fieldset>
            <legend>개인 프로필 정보</legend>
        </fieldset>
    </form>
    <br>
    <!-- HTML FORM EXAMPLE 3 -->
    <form>
        <fieldset>
            <legend>자기 소개</legend>
        </fieldset>
    </form>
    <br>
</body>
</html>
